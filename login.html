<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniHostel Login</title>
<link rel="stylesheet" href="login.css?v=200">
<script src="login.js?v=20"></script>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css?v=20">
<body>
<a href="index.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back to Portfolio
</a>
<div class="login-card">

    <div class="logo">
        <i class="fa-solid fa-building-columns"></i>
        <h1>UniHostel</h1>
        <p>Hostel Management System</p>
    </div>

    <div class="top-tabs">
        <button id="loginTab" class="active" onclick="showLogin()">Login</button>
        <button id="registerTab" onclick="showRegister()">Register</button>
    </div>

    <div id="loginForm">

        <div class="role-tabs">
            <button id="studentBtn" class="active" onclick="setRole('student')">Student</button>
            <button id="adminBtn" onclick="setRole('admin')">Admin</button>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-id-card"></i>
            <input type="text" id="userId" placeholder="Enter Roll Number">
        </div>

        <div class="captcha-box">
            <span id="captchaText"></span>
            <button onclick="generateCaptcha()">↻</button>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-shield-halved"></i>
            <input type="text" id="captchaInput" placeholder="Enter Captcha">
        </div>

        <button class="main-btn" onclick="loginUser()">Login</button>

    </div>

    <div id="registerForm">

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="regName" placeholder="Full Name">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-id-card"></i>
            <input type="text" id="regRoll" placeholder="Roll Number">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-building"></i>
            <input type="text" id="regDept" placeholder="Department">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-door-open"></i>
            <input type="text" id="regRoom" placeholder="Room Number">
        </div>

        <button class="main-btn" onclick="registerUser()">Register</button>

    </div>

    <p id="message"></p>

</div>

<script src="login.js"></script>
</body>
</html>
